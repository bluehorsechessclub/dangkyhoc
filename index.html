<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>♞ Blue Horse — Đăng ký học cờ vua</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* Paste toàn bộ style từ code bạn gửi, thêm cho textarea */
:root {
  --gold:#d4a017;--gold-light:#f0d060;--gold-glow:rgba(212,160,23,0.15);
  --navy:#0c1b33;--navy2:#132744;--navy3:#1a3358;
  --cream:#faf8f3;--white:#ffffff;
  --text:#1a1a2e;--text2:#4a4a5e;--dim:#8a8aa0;--border:#e8e5dd;
  --green:#059669;--red:#dc2626;
  --font:'Be Vietnam Pro',system-ui,sans-serif;
  --display:'Playfair Display',Georgia,serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--font);background:var(--cream);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
/* ... paste hết phần style còn lại từ code cũ của bạn, bao gồm hero, main, section, field, choice-row, error-msg, submit, success, toast ... */
/* Thêm cho textarea */
.field textarea {
  width:100%; min-height:100px; padding:15px 18px; border-radius:14px;
  border:2px solid #eeecea; background:#fdfcfa; font:500 15px var(--font);
  color:var(--text); outline:none; resize:vertical; transition:all .25s;
}
.field textarea:focus {
  border-color:var(--gold); background:var(--white); box-shadow:0 0 0 5px var(--gold-glow);
}
.field textarea::placeholder { color:#c5c3bc; font-weight:400; }
</style>
</head>
<body>

</div>
