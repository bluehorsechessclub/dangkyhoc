<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>♞ Blue Horse — Đăng ký học cờ vua</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* Giữ nguyên style cũ của bạn, chỉ thêm cho textarea */
.field textarea {
  width:100%; min-height:100px; padding:15px 18px; border-radius:14px;
  border:2px solid #eeecea; background:#fdfcfa; font:500 15px var(--font);
  color:var(--text); outline:none; resize:vertical; transition:all .25s;
}
.field textarea:focus {
  border-color:var(--gold); background:var(--white); box-shadow:0 0 0 5px var(--gold-glow);
}
.field textarea::placeholder { color:#c5c3bc; font-weight:400; }
/* ... phần style còn lại giữ nguyên như code bạn paste ... */
</style>
</head>
<body>

<!-- Hero section giữ nguyên -->
<div class="hero">
  <div class="chess-strip"></div>
  <div class="hero-inner">
    <div class="logo-row">
      <div class="logo-icon">♞</div>
      <div class="logo-text"><h1>BLUE HORSE</h1><span>CHESS CLUB</span></div>
    </div>
    <div class="hero-divider"></div>
    <div class="tournament-badge"><span>📝 ĐĂNG KÝ HỌC</span></div>
    <h2>ĐĂNG KÝ HỌC CỜ VUA<br><em>BLUE HORSE CHESS CLUB</em></h2>
  </div>
</div>

<div class="main">
  <div id="formArea" class="form-container">
    <!-- Các section 01, 02, 03 giữ nguyên như code bạn paste -->

    <!-- Section 04: Thêm trường Mong muốn -->
    <div class="section">
      <div class="section-head">
        <div class="section-num" style="background:#fef2f2;color:#dc2626;">04</div>
        <div><h3>Lịch học & Người giới thiệu & Mong muốn</h3><p>Thông tin bổ sung</p></div>
      </div>
      <!-- Thời lượng, Lịch học, Người giới thiệu giữ nguyên -->
      <!-- ... paste các field cũ ở đây ... -->

      <!-- Trường mới: Mong muốn (textarea, optional) -->
      <div class="field">
        <label><span class="ico">💭</span> Mong muốn của phụ huynh khi đăng ký cho con học cờ vua</label>
        <textarea id="mongMuon" placeholder="Ví dụ: Muốn con phát triển tư duy logic, rèn tính kiên nhẫn, chuẩn bị thi đấu giải, hoặc chỉ học để giải trí vui vẻ... (không bắt buộc)" rows="4"></textarea>
      </div>
    </div>

    <div class="submit-area">
      <button class="btn-submit" id="btnSubmit" onclick="submitForm()"><span>♞ &nbsp;GỬI ĐĂNG KÝ HỌC</span></button>
    </div>
  </div>

  <!-- Success area giữ nguyên -->
  <!-- ... paste phần success cũ ... -->

  <div class="toast" id="toast"></div>
</div>

<script>
// THAY BẰNG URL THẬT CỦA BẠN (từ Apps Script)
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw5ygkfW2cPq4rVa4A8ccEX27PrMWfymTmSUbbd7g56iot7sd6W3pByiJ4fJunkZD4A/exec";  // ← Sửa ở đây!

// Hàm showToast, validate giữ nguyên, chỉ thêm mongMuon vào formData
async function submitForm(){
  // ... validate giữ nguyên ...

  const formData = new FormData();
  // ... các append cũ ...
  formData.append('mongMuon', document.getElementById('mongMuon').value.trim() || '');  // Thêm trường mới
  formData.append('thoiGian', new Date().toLocaleString('vi-VN'));

  // ... fetch phần còn lại giữ nguyên ...
}

// resetForm: thêm reset textarea
function resetForm(){
  // ... các reset cũ ...
  document.querySelectorAll('textarea').forEach(e => e.value = '');
  // ... phần còn lại ...
}

// ... event listener giữ nguyên ...
</script>
</body>
</html>
